<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老人行为健康监测系统 - 手机号登录</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        .floating-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: float 6s ease-in-out infinite;
        }

        .floating-circle:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-circle:nth-child(2) {
            width: 100px;
            height: 100px;
            top: 60%;
            right: 15%;
            animation-delay: 2s;
        }

        .floating-circle:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #1a73e8);
        }

        .login-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: #5f6368;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 0.375rem;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 0.875rem;
            border: 2px solid #e8eaed;
            border-radius: 10px;
            font-size: 0.9375rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.125rem;
            color: #9aa0a6;
        }

        .verify-container {
            display: flex;
            gap: 0.75rem;
        }

        .verify-container .form-input {
            flex: 1;
            padding-right: 1rem;
        }

        .send-code-btn {
            padding: 0 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            min-width: 110px;
        }

        .send-code-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }

        .send-code-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #9aa0a6;
        }

        .login-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .error-message {
            color: #ea4335;
            font-size: 0.6875rem;
            margin-top: 0.375rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-message::before {
            content: '⚠️';
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
            color: #1a73e8;
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
            display: block;
        }

        .back-link:hover {
            color: #667eea;
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8125rem;
        }

        .login-success {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1a73e8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }

        .login-success.show {
            opacity: 1;
            visibility: visible;
        }

        .success-content {
            text-align: center;
            color: white;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        .success-text {
            font-size: 1.5rem;
            font-weight: 600;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .role-selector {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .role-option {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #e8eaed;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            background: white;
        }

        .role-option:hover {
            border-color: #1a73e8;
            background: rgba(26, 115, 232, 0.05);
        }

        .role-option.selected {
            border-color: #1a73e8;
            background: rgba(26, 115, 232, 0.1);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        .role-icon {
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }

        .role-name {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 0.8125rem;
        }

        .role-desc {
            font-size: 0.6875rem;
            color: #5f6368;
            margin-top: 0.125rem;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                padding: 0.75rem;
            }

            .login-card {
                padding: 1.5rem 1.25rem;
                border-radius: 16px;
            }

            .login-logo {
                font-size: 2rem;
                margin-bottom: 0.5rem;
            }

            .login-title {
                font-size: 1.25rem;
            }

            .login-subtitle {
                font-size: 0.8125rem;
            }

            .form-input {
                padding: 0.75rem 2.25rem 0.75rem 0.75rem;
                font-size: 0.875rem;
            }

            .verify-container {
                flex-direction: column;
            }

            .send-code-btn {
                width: 100%;
            }

            .role-selector {
                flex-direction: column;
                gap: 0.5rem;
            }

            .role-option {
                padding: 0.625rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }

            .role-icon {
                font-size: 1.25rem;
                margin-bottom: 0;
            }

            .role-desc {
                display: none;
            }

            .login-header {
                margin-bottom: 1.25rem;
            }

            .form-group {
                margin-bottom: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-circle"></div>
    <div class="floating-circle"></div>
    <div class="floating-circle"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">📱</div>
                <h1 class="login-title">手机号登录</h1>
                <p class="login-subtitle">请选择角色并完成验证</p>
            </div>
            
            <form id="phoneLoginForm">
                <div class="form-group">
                    <label class="form-label">选择角色</label>
                    <div class="role-selector">
                        <div class="role-option selected" data-role="admin" onclick="selectRole('admin')">
                            <div class="role-icon">👨‍💼</div>
                            <div class="role-name">管理员</div>
                            <div class="role-desc">设备管理 & 数据配置</div>
                        </div>
                        <div class="role-option" data-role="user" onclick="selectRole('user')">
                            <div class="role-icon">👤</div>
                            <div class="role-name">普通用户</div>
                            <div class="role-desc">查看监测数据</div>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="phone">手机号</label>
                    <div class="form-input-wrapper">
                        <input type="tel" id="phone" class="form-input" placeholder="请输入手机号" maxlength="11" autocomplete="tel">
                        <span class="input-icon">📱</span>
                    </div>
                    <div class="error-message" id="phoneError"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="verifyCode">验证码</label>
                    <div class="verify-container">
                        <input type="text" id="verifyCode" class="form-input" placeholder="请输入6位验证码" maxlength="6" autocomplete="one-time-code">
                        <button type="button" class="send-code-btn" id="sendCodeBtn" onclick="sendVerifyCode()">获取验证码</button>
                    </div>
                    <div class="error-message" id="verifyCodeError"></div>
                </div>
                
                <button type="submit" class="login-btn">登录 / 注册</button>
            </form>
            
            <a class="back-link" onclick="goToAccountLogin()">返回账号密码登录</a>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 老人行为健康监测系统 | 保护老人安全，守护家庭幸福</p>
        </div>
    </div>

    <div class="login-success" id="loginSuccess">
        <div class="success-content">
            <div class="success-icon">✅</div>
            <div class="success-text">登录成功，正在进入系统...</div>
        </div>
    </div>

    <script src="phone-login.js"></script>
</body>
</html>
